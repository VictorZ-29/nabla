<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
(function () {
  var t = null;
  try { t = localStorage.getItem('nabla-theme'); } catch (e) {}
  if (t !== 'light' && t !== 'dark') {
    try { t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'; } catch (e) { t = 'dark'; }
  }
  document.documentElement.setAttribute('data-theme', t);
})();
</script>
