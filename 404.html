<!DOCTYPE html>
<html lang="fr" data-theme="dark">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
/* Thème avant le premier rendu (pas de flash) : sombre pour tout le monde,
   sauf choix explicite « clair » enregistré via le toggle (localStorage). */
(function () {
  try {
    if (localStorage.getItem('nabla-theme') === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    }
  } catch (e) {}
})();
</script>
